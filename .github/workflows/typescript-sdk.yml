name: TypeScript SDK

on:
  push:
    branches: [main]
    paths:
      - "packages/typescript/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/typescript-sdk.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/typescript/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/typescript-sdk.yml"

concurrency:
  group: typescript-sdk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-and-test:
    name: lint, typecheck, test, treeshake
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 9.15.4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @asap-protocol/client lint

      - name: Typecheck
        run: pnpm --filter @asap-protocol/client run typecheck

      - name: Test with coverage
        run: pnpm --filter @asap-protocol/client test

      - name: Tree-shake check (agadoo)
        run: pnpm --filter @asap-protocol/client run check:treeshake
