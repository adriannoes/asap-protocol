# Runs only on tag push (e.g. v1.0.0): validates CHANGELOG, builds Docker image, publishes to PyPI and creates GitHub Release.
name: Release (PyPI + Docker)

on:
  push:
    tags:
      - "v*"

jobs:
  validate:
    name: Validate tag and CHANGELOG
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Check CHANGELOG has version section
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if ! grep -qF "## [${VERSION}]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no section ## [${VERSION}]"
            exit 1
          fi

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: [ validate ]
    permissions:
      contents: read
      packages: write  # Push to ghcr.io

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Docker meta (tags)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    needs: [ validate ]
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing API
      contents: write  # Required for creating GitHub releases

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # Fetch full history for changelog generation

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Build asap-protocol
        run: uv build

      - name: Install asap-protocol for asap-compliance build
        run: uv pip install dist/asap_protocol-*.whl

      - name: Build asap-compliance
        run: |
          cd asap-compliance && uv build
          cp -v dist/* ../dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          verbose: true
          attestations: false  # Disable PEP 740 attestations if they cause failures
          skip-existing: true  # Skip asap-compliance when unchanged (only asap-protocol bumped)
        # Publishes both asap-protocol and asap-compliance from dist/
        # Requires Trusted Publishing configured for BOTH projects on PyPI:
        #   - asap-protocol
        #   - asap-compliance

      - name: Extract version from tag
        id: tag_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate release notes from CHANGELOG
        id: release_notes
        run: |
          VERSION="${{ steps.tag_version.outputs.VERSION }}"
          python3 << 'PYTHON_SCRIPT'
          import os
          import re
          import subprocess

          version = os.environ.get("VERSION", "")
          repo = os.environ.get("GITHUB_REPOSITORY", "")
          current_tag = f"v{version}"

          def previous_tag(current: str) -> str:
              """Return the prior v* tag from git history (version-sorted)."""
              raw = subprocess.check_output(
                  ["git", "tag", "-l", "v*", "--sort=-version:refname"],
                  text=True,
              )
              tags = [t.strip() for t in raw.splitlines() if t.strip()]
              if current in tags:
                  idx = tags.index(current)
                  if idx + 1 < len(tags):
                      return tags[idx + 1]
              for tag in tags:
                  if tag != current:
                      return tag
              return "v0.1.0"

          prev = previous_tag(current_tag)

          with open("CHANGELOG.md", encoding="utf-8") as f:
              content = f.read()

          # Find the section for this version (from ## [VERSION] to next ## or end)
          pattern = rf"^## \[{re.escape(version)}\](.*?)(?=^## \[|\Z)"
          match = re.search(pattern, content, re.MULTILINE | re.DOTALL)
          compare = f"https://github.com/{repo}/compare/{prev}...{current_tag}"

          if match:
              notes = match.group(1).strip()
              notes += "\n\n---\n\n"
              notes += f"**Full Changelog**: {compare}"
              with open("release_notes.md", "w", encoding="utf-8") as out:
                  out.write(notes)
          else:
              with open("release_notes.md", "w", encoding="utf-8") as out:
                  out.write(f"Release {current_tag}\n\n")
                  out.write(f"**Full Changelog**: {compare}")
          PYTHON_SCRIPT
        env:
          VERSION: ${{ steps.tag_version.outputs.VERSION }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ steps.tag_version.outputs.VERSION }}"
          body_path: release_notes.md
          prerelease: false
          make_latest: true
          files: dist/*
