name: Mastra adapter CI

on:
  push:
    branches: [main]
    paths:
      - "packages/typescript/mastra/**"
      - "packages/typescript/client/**"
      - "apps/example-mastra/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/mastra-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/typescript/mastra/**"
      - "packages/typescript/client/**"
      - "apps/example-mastra/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/mastra-ci.yml"

permissions:
  contents: read

jobs:
  package-quality-and-test:
    name: (${{ matrix.mastra-core }} @mastra/core) lint, typecheck, test, treeshake
    concurrency:
      group: mastra-ci-${{ github.workflow }}-${{ github.ref }}-${{ matrix.mastra-core }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        mastra-core: ["latest", "1.5.0"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 9.15.4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set @mastra/core devDependency for matrix
        shell: bash
        env:
          MASTRA_CORE_SPEC: ${{ matrix.mastra-core }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");
          const pkgPath = "packages/typescript/mastra/package.json";
          const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
          const version = process.env.MASTRA_CORE_SPEC.trim();
          if (!version) {
            throw new Error("MASTRA_CORE_SPEC missing");
          }
          pkg.devDependencies = pkg.devDependencies ?? {};
          pkg.devDependencies["@mastra/core"] = version === "latest" ? "latest" : version;
          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + "\n");
          NODE

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm --filter @asap-protocol/mastra run lint

      - name: Typecheck
        run: pnpm --filter @asap-protocol/mastra run typecheck

      - name: Test with coverage (≥85% statements)
        run: pnpm --filter @asap-protocol/mastra test

      - name: Tree-shake check (agadoo)
        run: pnpm --filter @asap-protocol/mastra run check:treeshake

      - name: example-mastra lint + typecheck
        run: |
          pnpm --filter example-mastra run lint
          pnpm --filter example-mastra run typecheck
