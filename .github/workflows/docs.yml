# Deploys MkDocs to gh-pages on push to main only.
# Doc build is verified in CI (type-check job); this workflow only deploys.
# Path filters avoid redeploy when only code changed.
name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'src/asap/**'  # API docs may reference source

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: ./.github/actions/setup-python

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy docs
        run: uv run mkdocs gh-deploy --force
