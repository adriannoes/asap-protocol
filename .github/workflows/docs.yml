# Deploys MkDocs to gh-pages on push to main only.
# Doc build is verified in CI (type-check job); this workflow only deploys.
# Path filters avoid redeploy when only code changed.
#
# Note: We inject vercel.json into the gh-pages output so Vercel finds it and
# skips deployment (deploymentEnabled.gh-pages: false). Without this, Vercel
# clones gh-pages, looks for Root Directory "apps/web", fails, and the
# Ignored Build Step may not run early enough.
name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'vercel.json'  # Injected into gh-pages to skip Vercel deployment
      - 'src/asap/**'  # API docs may reference source

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python
        uses: ./.github/actions/setup-python

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build docs
        run: uv run mkdocs build

      - name: Add vercel.json to skip Vercel deployment of gh-pages
        run: |
          if [ -f vercel.json ]; then cp vercel.json site/vercel.json; fi

      - name: Deploy to gh-pages
        run: uv run python -m ghp_import -n -p site
