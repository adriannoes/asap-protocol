# CI: quality (lint+typecheck), transport surface lint (D4), test, coverage, security.
# 7 jobs total. Branch protection: require quality (python), lint transport growth (D4), quality (web), test (python), test (web), coverage, security.
name: CI

on:
  push:
    branches: [main, release/2.5.0]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'tests/**'
      - 'asap-compliance/**'
      - 'examples/**'
      - 'docs/**'
      - 'apps/web/**'
      - 'apps/example-agent/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'mkdocs.yml'
      - '.github/workflows/**'
      - '.github/actions/**'
  pull_request:
    branches: [main, release/2.5.0]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'tests/**'
      - 'asap-compliance/**'
      - 'examples/**'
      - 'docs/**'
      - 'apps/web/**'
      - 'apps/example-agent/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'mkdocs.yml'
      - '.github/workflows/**'
      - '.github/actions/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-transport-growth:
    name: lint transport growth (D4)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Enforce transport monolith baseline
        run: python3 scripts/lint_no_transport_growth.py

  quality-python:
    name: quality (python)
    runs-on: ubuntu-latest
    timeout-minutes: 14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Setup Python
        uses: ./.github/actions/setup-python
      - name: Lint with ruff
        run: |
          uv run ruff check . --output-format=github
          uv run ruff format --check .
      - name: Type check with mypy
        run: uv run mypy src/ scripts/ tests/
      - name: Build docs
        run: uv run mkdocs build

  quality-web:
    name: quality (web)
    runs-on: ubuntu-latest
    timeout-minutes: 14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Full history so Prettier can diff PR-touched TS/TSX vs base (block new drift only).
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: apps/web
      - name: Format check (PR-touched TS/TSX only)
        working-directory: apps/web
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            git fetch --no-tags origin main:refs/remotes/origin/main 2>/dev/null || true
            BASE="$(git merge-base HEAD origin/main 2>/dev/null || git rev-parse HEAD^)"
          fi
          mapfile -t FILES < <(
            git -C "${GITHUB_WORKSPACE}" diff --name-only --diff-filter=ACMR "${BASE}...HEAD" -- \
              'apps/web/**/*.ts' 'apps/web/**/*.tsx' \
              | sed 's|^apps/web/||'
          )
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No TS/TSX changes under apps/web; skipping Prettier."
            exit 0
          fi
          echo "Checking ${#FILES[@]} file(s) with Prettier (new drift only):"
          printf '  %s\n' "${FILES[@]}"
          # format:check accepts path args; full-tree check is intentionally not gated (historical drift).
          npm run format:check -- "${FILES[@]}"
      - name: Lint
        run: npm run lint
        working-directory: apps/web
      - name: Type check
        run: npx tsc --noEmit
        working-directory: apps/web
      - name: npm audit (production, moderate+)
        run: npm audit --omit=dev --audit-level=moderate
        working-directory: apps/web
      - name: npm audit (all deps, high+)
        run: npm audit --audit-level=high
        working-directory: apps/web

  test-python:
    name: test (python)
    runs-on: ubuntu-latest
    needs: [quality-python, lint-transport-growth]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Setup Python
        uses: ./.github/actions/setup-python
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}
        run: uv run pytest -n auto --tb=short --ignore=tests/adapters/mcp/
        timeout-minutes: 12
      - name: Run MCP adapter tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}
        run: uv run pytest tests/adapters/mcp/ -v --tb=short
      - name: Run compliance tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}:${{ github.workspace }}/asap-compliance
        run: uv run pytest asap-compliance/tests/ -q --tb=short
      - name: Example agent Compliance Harness v2 baseline
        working-directory: apps/example-agent
        run: |
          uv sync --frozen --group dev
          uv run pytest tests/ -q --tb=short

  test-web:
    name: test (web)
    runs-on: ubuntu-latest
    needs: [quality-web]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: apps/web
      - name: Vitest
        run: npm test
        working-directory: apps/web
      - name: Vitest coverage
        run: npm run test:coverage
        working-directory: apps/web

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: [quality-python, lint-transport-growth]
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Setup Python
        uses: ./.github/actions/setup-python
      - name: Run tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}
        run: |
          for i in 1 2; do
            echo "Coverage attempt $i/2"
            if uv run pytest --tb=short --cov=asap --cov-report=xml --cov-fail-under=85; then
              echo "Coverage passed on attempt $i"
              exit 0
            fi
            echo "Coverage attempt $i failed, retrying..."
          done
          echo "Coverage failed after 2 attempts"
          exit 1
        timeout-minutes: 15
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: security
    runs-on: ubuntu-latest
    needs: [quality-python, lint-transport-growth]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Setup Python
        uses: ./.github/actions/setup-python
        with:
          # Omit extras whose transitive deps have no OSV fix on PyPI (diskcache, nltk).
          sync-flags: --no-extra crewai --no-extra llamaindex
      # CVE-2026-4539: pygments advisory with no patched PyPI release yet (override pins >=2.20 when available).
      # CVE-2026-4963 / CVE-2026-2654: smolagents optional extra; OSV lists no fix version on PyPI as of 2026-05 (see SECURITY.md).
      # PYSEC-2026-89 / PYSEC-2025-183 / PYSEC-2024-271: optional/transitive; see SECURITY.md.
      - name: Scan for vulnerabilities (pip-audit)
        run: uv run pip-audit --ignore-vuln CVE-2026-4539 --ignore-vuln CVE-2026-4963 --ignore-vuln CVE-2026-2654 --ignore-vuln PYSEC-2024-271 --ignore-vuln PYSEC-2026-89 --ignore-vuln PYSEC-2025-183
      - name: Scan for security issues (bandit)
        run: uv run bandit -r src/ -ll
