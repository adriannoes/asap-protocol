version: 2
updates:
  # ──────────────────────────────────────────────
  # Python dependencies (pip ecosystem)
  # ──────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    # Group minor/patch bumps into a single PR to reduce noise.
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"
    # Ignore major bumps — review those manually via issues.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ──────────────────────────────────────────────
  # npm dependencies (apps/web)
  # ──────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      # Production deps: group minor/patch together
      npm-production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      # Dev deps: group minor/patch together (types, linters, etc.)
      npm-development:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    # Ignore major bumps — review those manually.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ──────────────────────────────────────────────
  # GitHub Actions
  # ──────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      github-actions:
        patterns:
          - "*"
